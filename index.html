<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SMART FARM V10 PRO</title>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{margin:0;font-family:Arial;background:#0f172a;color:#fff}
.sidebar{width:220px;position:fixed;height:100%;background:#111827;padding:10px}
.main{margin-left:230px;padding:10px}

.menu button{width:100%;padding:10px;margin:5px 0;border:none;border-radius:10px;background:#1f2937;color:#fff}
.card{background:#1f2937;padding:10px;margin:10px;border-radius:12px}

.section{display:none}
.active{display:block}

button{cursor:pointer}
.on{background:#22c55e}
.off{background:#ef4444}
</style>
</head>

<body>

<div class="sidebar">
<h3>🌱 FARM V10</h3>
<div class="menu">
<button onclick="show('dash')">🏠 Dashboard</button>
<button onclick="show('pump')">💧 Pump</button>
<button onclick="show('hist')">📈 History</button>
<button onclick="show('user')">👥 Admin</button>
<button onclick="show('set')">⚙️ Settings</button>
<button onclick="show('log')">📋 Log</button>
<button onclick="show('ota')">🔄 OTA</button>
<button onclick="logout()">🚪 Logout</button>
</div>
</div>

<div class="main">

<!-- DASHBOARD -->
<div id="dash" class="section active card">
<h2>Dashboard</h2>
<p>Status: <span id="status">OFFLINE</span></p>
<p>Temp: <span id="temp">--</span></p>
<p>Hum: <span id="hum">--</span></p>
</div>

<!-- PUMP -->
<div id="pump" class="section card">
<h2>Pump Control</h2>
<button class="on" onclick="pump('ON')">ON</button>
<button class="off" onclick="pump('OFF')">OFF</button>
<p id="pumpState">--</p>
</div>

<!-- HISTORY -->
<div id="hist" class="section card">
<h2>History</h2>
<canvas id="chart"></canvas>
</div>

<!-- ADMIN -->
<div id="user" class="section card">
<h2>Admin</h2>
<input id="u" placeholder="user"><br>
<input id="p" type="password" placeholder="pass"><br>
<button onclick="login()">Login</button>
<p id="role">Guest</p>
</div>

<!-- SETTINGS -->
<div id="set" class="section card">
<h2>Settings</h2>
<input id="limit" type="number" placeholder="Rain limit">
<button onclick="save()">Save</button>
</div>

<!-- LOG -->
<div id="log" class="section card">
<h2>Log</h2>
<div id="logs"></div>
</div>

<!-- OTA -->
<div id="ota" class="section card">
<h2>OTA Update</h2>
<p>Firmware URL:</p>
<input style="width:100%" placeholder="http://...firmware.bin">
<button>Send OTA</button>
</div>

</div>

<script>
const client = mqtt.connect("wss://broker.hivemq.com:8884/mqtt");

let logs=[];

function show(id){
document.querySelectorAll('.section').forEach(e=>e.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

function addLog(m){
logs.unshift(m);
if(logs.length>50) logs.pop();
document.getElementById('logs').innerHTML = logs.join('<br>');
}

client.on("connect",()=>{
document.getElementById("status").innerText="ONLINE";
client.subscribe("farm/#");
addLog("MQTT Connected");
});

client.on("message",(t,m)=>{
const v=m.toString();

if(t==="farm/temp") document.getElementById("temp").innerText=v;
if(t==="farm/hum") document.getElementById("hum").innerText=v;
if(t==="farm/pump/state") document.getElementById("pumpState").innerText=v;

addLog(t+" : "+v);
});

function pump(v){
client.publish("farm/pump/cmd",v);
addLog("Pump "+v);
}

function login(){
if(u.value=="admin"&&p.value=="1234"){
document.getElementById("role").innerText="ADMIN";
localStorage.setItem("role","admin");
addLog("Login success");
}
}

function save(){
if(localStorage.getItem("role")!="admin") return;
localStorage.setItem("limit",limit.value);
addLog("Settings saved");
}

function logout(){
localStorage.clear();
location.reload();
}

// chart
const ctx=document.getElementById("chart").getContext("2d");
const chart=new Chart(ctx,{
type:'line',
data:{labels:[],datasets:[{label:'Temp',data:[]}]}
});

client.on("message",(t,m)=>{
if(t==="farm/temp"){
chart.data.labels.push("");
chart.data.datasets[0].data.push(m.toString());
if(chart.data.labels.length>20){
chart.data.labels.shift();
chart.data.datasets[0].data.shift();
}
chart.update();
}
});
</script>

</body>
</html>
