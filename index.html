<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">

 const s=document.getElementById('splash');
 if(s){s.classList.add('fadeout');setTimeout(()=>s.remove(),700);}

<title>Smart Farm V9 PRO</title>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
margin:0;font-family:Arial;
background:linear-gradient(135deg,#0f172a,#14532d);
color:#fff;
}

.header{
text-align:center;
padding:15px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(15px);
border-radius:20px;
margin:10px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
padding:10px;
}

.card{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(15px);
border-radius:20px;
padding:15px;
text-align:center;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:15px;
color:#fff;
font-weight:bold;
}

.on{background:#22c55e}
.off{background:#ef4444}

.offline{color:#f87171}
.online{color:#4ade80}

canvas{
background:rgba(255,255,255,0.05);
border-radius:15px;
padding:10px;
}
</style>
</head>

<body>

<div id="splash">
<img src="suanlungna_icon_180.png">
<h1>🌱 สวนลุงนะ ฟาร์ม🌏</h1>
<p style="color:white">อย่าทำเฒ่า ถ้าเท่าแต่แหลง</p>
</div>

<div id="toast" class="toast"></div>


<div class="header">
<img src="suanlungna_icon_180.png" style="width:90px;height:90px;border-radius:20px;margin-bottom:10px;">
<h1>🌱 สวนลุงนะ ฟาร์ม</h1>
<p>Smart Farm Dashboard V7.5 Branding</p>
</div>

<div class="grid">

<div class="card">
<h3>🚰 Pump</h3>
<p id="pump">--</p>
<button class="on" onclick="pumpOn()">ON</button>
<button class="off" onclick="pumpOff()">OFF</button>
</div>

<div class="card">
<h3>📡 Sensor</h3>
<p>🌡 <span id="temp">--</span> °C</p>
<p>💧 <span id="hum">--</span> %</p>
<p>🌧 <span id="rain">--</span></p>
</div>

</div>

<div class="card">
<h3>📊 Realtime Chart</h3>
<canvas id="chart"></canvas>
</div>

<script src="app.js"></script>

</body>
</html>
